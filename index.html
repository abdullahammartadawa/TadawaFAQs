<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tadawa Portal FAQs</title>
    <style>
        :root {
            --primary: #2b6cb0;
            --primary-hover: #1a4e8a;
            --bg-start: #eef2f7; 
            --bg-end: #e2e8f0;
            --text: #2d3748;
            --white: #ffffff;
            --border: #e2e8f0;
            --nav-bg: #edf2f7;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, var(--bg-start), var(--bg-end));
            color: var(--text);
            margin: 0;
            padding: 40px 20px;
            line-height: 1.6;
            min-height: 100vh;
        }
        
        /* Fixed Transparent Background Watermark Logo Layer */
        body::before {
            content: "";
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 60vw;
            max-width: 500px;
            height: 500px;
            background-image: url('logo.png');
            background-size: contain;
            background-position: center;
            background-repeat: no-repeat;
            opacity: 0.04; /* Change this value up or down to adjust transparency blend */
            z-index: -1;
            pointer-events: none;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: var(--white);
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            position: relative;
        }
        
        .brand-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .brand-logo {
            max-width: 220px;
            height: auto;
            display: block;
            margin: 0 auto 15px auto;
        }

        h1 {
            text-align: center;
            color: var(--primary);
            margin-bottom: 25px;
            font-size: 1.8rem;
        }
        .sheet-tabs {
            display: flex;
            flex-wrap: wrap;
            background: var(--nav-bg);
            border-radius: 8px 8px 0 0;
            padding: 5px 5px 0 5px;
            border: 1px solid var(--border);
            border-bottom: none;
            gap: 4px;
        }
        .sheet-btn {
            padding: 12px 20px;
            background: transparent;
            border: none;
            cursor: pointer;
            font-weight: 600;
            color: #4a5568;
            border-radius: 6px 6px 0 0;
            transition: all 0.2s ease;
            font-size: 0.95rem;
        }
        .sheet-btn:hover {
            background: rgba(255,255,255,0.5);
            color: var(--primary);
        }
        .sheet-btn.active {
            background: var(--white);
            color: var(--primary);
            border: 1px solid var(--border);
            border-bottom: 2px solid var(--white);
            margin-bottom: -1px;
        }
        .content-box {
            border: 1px solid var(--border);
            padding: 25px;
            background: var(--white);
            border-radius: 0 0 8px 8px;
        }
        .controls-row {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
            align-items: center;
            flex-wrap: wrap;
        }
        .search-container {
            flex: 1;
            min-width: 280px;
        }
        .search-bar {
            width: 100%;
            padding: 12px 18px;
            font-size: 0.95rem;
            border: 2px solid var(--border);
            border-radius: 8px;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.3s ease;
        }
        .search-bar:focus { border-color: var(--primary); }
        .lang-switch { display: flex; gap: 10px; }
        .lang-btn {
            padding: 10px 18px;
            border: 2px solid var(--primary);
            background: transparent;
            color: var(--primary);
            cursor: pointer;
            border-radius: 6px;
            font-weight: bold;
            font-size: 0.9rem;
            transition: all 0.2s ease;
        }
        .lang-btn.active, .lang-btn:hover {
            background: var(--primary);
            color: var(--white);
        }
        .sheet-content { display: none; }
        .sheet-content.active { display: block; }
        .faq-group { display: none; }
        .faq-group.active { display: block; }
        .faq-item { border-bottom: 1px solid var(--border); padding: 16px 0; }
        .faq-question {
            font-size: 1.05rem;
            font-weight: 600;
            color: #1a202c;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            user-select: none;
        }
        .chevron { font-size: 0.75rem; color: #a0aec0; transition: transform 0.2s ease; }
        .faq-item.open .chevron { transform: rotate(180deg); color: var(--primary); }
        .faq-answer {
            display: none;
            color: #4a5568;
            padding-top: 10px;
            padding-right: 20px;
            white-space: pre-line;
            font-size: 0.98rem;
        }
        .faq-item.open .faq-answer { display: block; }
        
        .video-container {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden;
            max-width: 100%;
            background: #000;
            margin-top: 15px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }
        .note-box {
            margin-top: 8px;
            background: #edf2f7;
            padding: 10px 15px;
            border-left: 4px solid var(--primary);
            font-style: italic;
            font-size: 0.92rem;
            border-radius: 4px;
        }
        .no-results { display: none; text-align: center; color: #718096; font-size: 1.1rem; padding: 20px 0; }
        .rtl { direction: rtl; }
        .rtl .faq-answer { padding-right: 0; padding-left: 20px; }
        .rtl .note-box { border-left: none; border-right: 4px solid var(--primary); }
    </style>
</head>
